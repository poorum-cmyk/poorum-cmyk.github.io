<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>모바일 테트리스</title>
    <style>
        :root {
            --bg-color: #0b091a;
            --panel-bg: #161230;
            --accent-blue: #115372;
            --text-color: #ffffff;
            --board-border: #2a245a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Malgun Gothic', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        /* 메인 컨테이너 */
        #game-wrapper {
            display: flex;
            gap: 15px;
            padding: 10px;
        }

        /* 게임 보드 */
        #board-container {
            position: relative;
            border: 4px solid var(--board-border);
            background-image: linear-gradient(to right, #ffffff05 1px, transparent 1px),
                              linear-gradient(to bottom, #ffffff05 1px, transparent 1px);
            background-size: 24px 24px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
        }

        /* 우측 사이드바 */
        #sidebar {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            min-width: 100px;
            gap: 15px;
        }

        .info-label { font-size: 18px; margin-bottom: 2px; }
        .info-value { font-size: 16px; margin-bottom: 10px; color: #aaa; }

        #next-preview {
            width: 80px;
            height: 80px;
            background-color: #1a1a3a;
            border: 2px solid #2a2a5a;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-btn {
            background: none;
            border: none;
            color: white;
            font-size: 22px;
            text-align: left;
            cursor: pointer;
            padding: 5px 0;
        }

        /* 하단 컨트롤러 */
        #controls {
            margin-top: 30px;
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 400px;
        }

        /* 조이스틱 (스틱) */
        #joystick-zone {
            width: 100px;
            height: 100px;
            background-color: #0d4a63;
            border: 4px solid #083142;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        #joystick-zone::after {
            content: "스틱";
            color: white;
            font-size: 14px;
        }

        #stick-knob {
            width: 40px;
            height: 40px;
            background-color: #1a7fa0;
            border-radius: 50%;
            position: absolute;
            transition: 0.1s;
            pointer-events: none;
            opacity: 0.7;
        }

        /* 회전 버튼 */
        #rotate-btn {
            width: 100px;
            height: 100px;
            background-color: #115372;
            border: 3px solid #083142;
            color: white;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        #rotate-btn:active { background-color: #1a7fa0; }

        /* 블록 색상 */
        .color-I { background: #00f0f0; }
        .color-J { background: #0000f0; }
        .color-L { background: #f0a000; }
        .color-O { background: #f0f000; }
        .color-S { background: #00f000; }
        .color-T { background: #a000f0; }
        .color-Z { background: #f00000; }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="board-container">
            <canvas id="tetris" width="240" height="480"></canvas>
        </div>

        <div id="sidebar">
            <div class="info-label">스코어</div>
            <div class="info-value" id="score">0</div>
            
            <div class="info-label">레벨</div>
            <div class="info-value" id="level">1</div>
            
            <div class="info-label">라인</div>
            <div class="info-value" id="line">0</div>

            <div class="info-label">다음조각</div>
            <div id="next-preview">
                <canvas id="next" width="60" height="60"></canvas>
            </div>

            <button class="menu-btn" id="start-btn">시작</button>
            <button class="menu-btn" id="pause-btn">일시정지</button>
        </div>
    </div>

    <div id="controls">
        <div id="joystick-zone">
            <div id="stick-knob" style="display: none;"></div>
        </div>
        <div id="rotate-btn">회전</div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next');
        const nextContext = nextCanvas.getContext('2d');

        context.scale(24, 24);
        nextContext.scale(15, 15);

        // 블록 설정
        function createPiece(type) {
            if (type === 'I') {
                return [
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                ];
            } else if (type === 'L') {
                return [
                    [0, 2, 0],
                    [0, 2, 0],
                    [0, 2, 2],
                ];
            } else if (type === 'J') {
                return [
                    [0, 3, 0],
                    [0, 3, 0],
                    [3, 3, 0],
                ];
            } else if (type === 'O') {
                return [
                    [4, 4],
                    [4, 4],
                ];
            } else if (type === 'Z') {
                return [
                    [5, 5, 0],
                    [0, 5, 5],
                    [0, 0, 0],
                ];
            } else if (type === 'S') {
                return [
                    [0, 6, 6],
                    [6, 6, 0],
                    [0, 0, 0],
                ];
            } else if (type === 'T') {
                return [
                    [0, 7, 0],
                    [7, 7, 7],
                    [0, 0, 0],
                ];
            }
        }

        const colors = [
            null,
            '#00f0f0', // I
            '#f0a000', // L
            '#0000f0', // J
            '#f0f000', // O
            '#f00000', // Z
            '#00f000', // S
            '#a000f0', // T
        ];

        // 보드 생성
        function createMatrix(w, h) {
            const matrix = [];
            while (h--) {
                matrix.push(new Array(w).fill(0));
            }
            return matrix;
        }

        // 블록 그리기
        function drawMatrix(matrix, offset, ctx) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value];
                        // 입체감 있는 블록 디자인
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                        ctx.lineWidth = 0.05;
                        ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function draw() {
            context.fillStyle = '#0b091a';
            context.fillRect(0, 0, canvas.width, canvas.height);

            drawMatrix(arena, {x: 0, y: 0}, context);
            drawMatrix(player.matrix, player.pos, context);
        }

        function drawNext() {
            nextContext.fillStyle = '#1a1a3a';
            nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            drawMatrix(player.next, {x: 1, y: 1}, nextContext);
        }

        // 충돌 감지
        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                       (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        // 아레나에 블록 병합
        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        // 라인 제거
        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) {
                        continue outer;
                    }
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;

                player.score += rowCount * 10;
                player.lines += 1;
                rowCount *= 2;
            }
            updateStats();
        }

        function updateStats() {
            document.getElementById('score').innerText = player.score;
            document.getElementById('line').innerText = player.lines;
            player.level = Math.floor(player.lines / 10) + 1;
            document.getElementById('level').innerText = player.level;
            // 레벨에 따른 속도 조절
            dropInterval = Math.max(100, 1000 - (player.level - 1) * 100);
        }

        // 회전
        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [
                        matrix[x][y],
                        matrix[y][x],
                    ] = [
                        matrix[y][x],
                        matrix[x][y],
                    ];
                }
            }
            if (dir > 0) {
                matrix.forEach(row => row.reverse());
            } else {
                matrix.reverse();
            }
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                updateStats();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) {
                player.pos.x -= dir;
            }
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            if (player.next === null) {
                player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            } else {
                player.matrix = player.next;
            }
            player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) -
                           (player.matrix[0].length / 2 | 0);
            
            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                player.score = 0;
                player.lines = 0;
                player.level = 1;
                updateStats();
            }
            drawNext();
        }

        const arena = createMatrix(10, 20);

        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            next: null,
            score: 0,
            lines: 0,
            level: 1,
        };

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let paused = false;

        function update(time = 0) {
            if (paused) return;
            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }

            draw();
            requestAnimationFrame(update);
        }

        // 조이스틱 조작 로직
        const joystick = document.getElementById('joystick-zone');
        const knob = document.getElementById('stick-knob');
        let startX, startY;
        const threshold = 30; // 조작 인식 범위(px)

        joystick.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            knob.style.display = 'block';
            knob.style.left = '30px';
            knob.style.top = '30px';
        });

        joystick.addEventListener('touchmove', e => {
            if (paused) return;
            const moveX = e.touches[0].clientX;
            const moveY = e.touches[0].clientY;
            const diffX = moveX - startX;
            const diffY = moveY - startY;

            // 시각적 피드백
            knob.style.transform = `translate(${Math.max(-30, Math.min(30, diffX))}px, ${Math.max(-30, Math.min(30, diffY))}px)`;

            if (Math.abs(diffX) > threshold) {
                playerMove(diffX > 0 ? 1 : -1);
                startX = moveX; // 기준점 이동 (연속 이동 가능하게)
            }
            if (diffY > threshold) {
                playerDrop();
                startY = moveY;
            }
            if (diffY < -threshold) {
                // 하드 드롭 (위로 드래그)
                while (!collide(arena, player)) {
                    player.pos.y++;
                }
                player.pos.y--;
                playerDrop();
                startY = moveY;
            }
        });

        joystick.addEventListener('touchend', () => {
            knob.style.display = 'none';
            knob.style.transform = `translate(0, 0)`;
        });

        // 기타 버튼 이벤트
        document.getElementById('rotate-btn').addEventListener('click', () => {
            if (!paused) playerRotate(1);
        });

        document.getElementById('start-btn').addEventListener('click', () => {
            paused = false;
            arena.forEach(row => row.fill(0));
            playerReset();
            updateStats();
            update();
        });

        document.getElementById('pause-btn').addEventListener('click', () => {
            paused = !paused;
            if (!paused) update();
        });

        // 초기화
        playerReset();
        draw();
        drawNext();
    </script>
</body>
</html>
